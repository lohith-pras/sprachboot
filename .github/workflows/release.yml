name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            triple: aarch64-apple-darwin
          - os: windows-latest
            triple: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with: { node-version: "22" }

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - uses: dtolnay/rust-toolchain@stable
        with: { targets: "${{ matrix.triple }}" }

      - name: Build frontend (static export)
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Build backend sidecar
        working-directory: backend
        run: |
          uv sync --all-groups
          uv run pyinstaller sprachboot-server.spec --noconfirm

      - name: Stage sidecar with target triple
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp backend/dist/sprachboot-server.exe "src-tauri/binaries/sprachboot-server-${{ matrix.triple }}.exe"
          else
            cp backend/dist/sprachboot-server "src-tauri/binaries/sprachboot-server-${{ matrix.triple }}"
          fi

      - name: Build Tauri app and publish to release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          tagName: ${{ github.ref_name }}
          releaseName: "SprachBoot ${{ github.ref_name }}"
          releaseBody: |
            Download the `.dmg` (macOS) or `.exe` (Windows) installer below.

            ### macOS — first launch
            The app is not signed with an Apple Developer certificate, so macOS
            Gatekeeper will mark it "damaged" or refuse to open it. To bypass:

            1. Drag **SprachBoot** to Applications.
            2. Run this once in Terminal:
               ```
               xattr -cr /Applications/SprachBoot.app
               ```
            3. Open the app normally.

            (Alternatively: right-click the app → **Open** → **Open** on the dialog.)
          releaseDraft: false
          prerelease: false
